<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Checkout Pagar.me</title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but this app doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    
    <!-- Carrega o SDK oficial da Pagar.me v4 (compatível com sua chave) -->
    <script src="https://assets.pagar.me/pagarme-js/1.3.1/pagarme.min.js"></script>
    
    <script>
      // Inicializa o SDK assim que ele carregar, deixando-o pronto para uso no Vue.
      window.Pagarme = window.Pagarme || {};
      window.Pagarme.initialize = function() {
        if (typeof pagarme !== 'undefined') {
          window.pagarme = pagarme;
          console.log('SDK Pagar.me inicializado com sucesso.');
        }
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.Pagarme.initialize);
      } else {
        window.Pagarme.initialize();
      }
    </script>
  </body>
</html>
